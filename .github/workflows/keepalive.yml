name: Keep Render Service Awake

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-service-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping public endpoints
        run: |
          stamp="$(date +%s)"
          for url in \
            "https://acaim.cn/api/status?keepalive=github-actions-${stamp}" \
            "https://acaim.onrender.com/health?keepalive=github-actions-${stamp}"; do
            curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 "$url"
            echo
          done
